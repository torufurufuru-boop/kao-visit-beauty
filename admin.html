<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kao 管理画面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Josefin+Sans:wght@300;400&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --ocean:#5BAEBC;--ocean-l:#A8DDE4;--ocean-ll:#D8ECF0;
  --dawn:#F4C5BA;--dawn-l:#EDD5CC;
  --sand:#F8F6F4;--sand-d:#F0ECE7;
  --deep:#4A7D8A;--muted:#8ABBC2;--muted-d:#557F87;--ink:#2C3E42;
  --en:'Cormorant Garamond',serif;
  --label:'Josefin Sans',sans-serif;
  --jp:'Zen Kaku Gothic New',sans-serif;
  --ease:cubic-bezier(.22,.61,.36,1);
  --radius:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--sand);color:var(--ink);font-family:var(--jp);font-size:14px;line-height:1.7;letter-spacing:.03em;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;font-family:var(--jp);}
input,select,textarea{font-family:var(--jp);font-size:14px;}

/* ===== PASSWORD OVERLAY ===== */
#pw-overlay{position:fixed;inset:0;z-index:9999;background:rgba(248,246,244,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:28px;}
#pw-overlay img{height:64px;width:auto;opacity:.9;}
#pw-overlay p.sub{font-family:var(--label);font-size:12px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;}
#pw-form{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:280px;padding:0 24px;}
#pw-input{width:100%;height:50px;border:1.5px solid var(--ocean-l);border-radius:4px;background:#fff;text-align:center;font-family:var(--en);font-size:20px;letter-spacing:.18em;color:var(--ink);outline:none;padding:0 16px;transition:border-color .3s;}
#pw-input:focus{border-color:var(--ocean);box-shadow:0 0 0 3px rgba(91,174,188,.16);}
#pw-err{font-size:12px;color:var(--dawn);letter-spacing:.08em;opacity:0;transition:opacity .3s;}
#pw-submit{width:100%;height:46px;background:var(--ocean);color:#fff;border:none;border-radius:999px;font-family:var(--label);font-size:12.5px;letter-spacing:.22em;text-transform:uppercase;transition:background .3s;}
#pw-submit:hover{background:var(--deep);}

/* ===== HEADER ===== */
.adm-header{background:#fff;border-bottom:1px solid var(--ocean-ll);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
.adm-header .logo{display:flex;align-items:center;gap:12px;}
.adm-header .logo img{height:36px;width:auto;}
.adm-header .logo-label{font-family:var(--label);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted-d);border-left:1px solid var(--ocean-l);padding-left:12px;}
.adm-header .logout{font-family:var(--label);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-d);padding:6px 14px;border:1px solid var(--ocean-l);border-radius:999px;transition:all .3s;}
.adm-header .logout:hover{background:var(--ocean-ll);}

/* ===== TABS ===== */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--ocean-ll);background:#fff;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{flex:none;padding:14px 22px;font-family:var(--label);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-d);background:none;border:none;border-bottom:2px solid transparent;transition:all .3s;white-space:nowrap;}
.tab-btn.active{color:var(--ocean);border-bottom-color:var(--ocean);}
.tab-btn:hover:not(.active){color:var(--ink);}

/* ===== MAIN CONTENT ===== */
.adm-main{max-width:1100px;margin:0 auto;padding:28px 20px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ===== SECTION HEADER ===== */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.sec-title{font-size:16px;font-weight:400;letter-spacing:.08em;color:var(--ink);}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border-radius:999px;font-family:var(--label);font-size:12px;letter-spacing:.16em;text-transform:uppercase;border:none;transition:all .3s;white-space:nowrap;}
.btn-primary{background:var(--ocean);color:#fff;box-shadow:0 6px 18px -8px rgba(91,174,188,.7);}
.btn-primary:hover{background:var(--deep);transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--deep);border:1px solid var(--ocean-l);}
.btn-ghost:hover{background:var(--ocean-ll);}
.btn-danger{background:transparent;color:#c0392b;border:1px solid #f5c6c6;font-size:11px;padding:6px 14px;}
.btn-danger:hover{background:#fff5f5;}
.btn-map{background:transparent;color:var(--deep);border:1px solid var(--ocean-l);font-size:11px;padding:6px 14px;}
.btn-map:hover{background:var(--ocean-ll);}
.btn-sm{padding:6px 14px;font-size:11px;}

/* ===== TABLE ===== */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--ocean-ll);background:#fff;}
table{width:100%;border-collapse:collapse;}
thead th{padding:11px 16px;font-family:var(--label);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-d);background:var(--sand);text-align:left;white-space:nowrap;border-bottom:1px solid var(--ocean-ll);}
tbody td{padding:12px 16px;border-bottom:1px solid var(--ocean-ll);color:var(--ink);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--sand);}
.td-actions{display:flex;gap:8px;align-items:center;}
.empty-row td{text-align:center;padding:40px;color:var(--muted-d);font-size:13px;letter-spacing:.06em;}

/* STATUS BADGES */
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-family:var(--label);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;}
.badge-confirmed{background:rgba(91,174,188,.15);color:var(--deep);}
.badge-tentative{background:rgba(244,197,186,.3);color:#8b5e52;}
.badge-completed{background:rgba(91,174,188,.08);color:var(--muted-d);}
.badge-cancelled{background:#f5f5f5;color:#aaa;}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;z-index:200;background:rgba(44,62,66,.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;visibility:hidden;transition:opacity .35s var(--ease),visibility .35s;}
.modal-bg.open{opacity:1;visibility:visible;}
.modal{background:#fff;border-radius:10px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:32px 28px;box-shadow:0 40px 80px -30px rgba(44,62,66,.35);transform:translateY(20px);transition:transform .35s var(--ease);}
.modal-bg.open .modal{transform:none;}
.modal h3{font-size:16px;letter-spacing:.08em;margin-bottom:22px;color:var(--ink);}
.form-row{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;}
.form-row label{font-family:var(--label);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-d);}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:10px 14px;border:1.5px solid var(--ocean-l);border-radius:4px;background:#fff;color:var(--ink);outline:none;transition:border-color .3s,box-shadow .3s;font-size:14px;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--ocean);box-shadow:0 0 0 3px rgba(91,174,188,.12);}
.form-row textarea{resize:vertical;min-height:70px;}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;padding-top:18px;border-top:1px solid var(--ocean-ll);}

/* ===== CALENDAR ===== */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.cal-title{font-family:var(--en);font-style:italic;font-size:26px;color:var(--deep);}
.cal-nav-btn{background:none;border:1px solid var(--ocean-l);color:var(--deep);width:34px;height:34px;border-radius:50%;font-size:16px;transition:all .3s;display:flex;align-items:center;justify-content:center;}
.cal-nav-btn:hover{background:var(--ocean-ll);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{padding:7px 4px;text-align:center;font-family:var(--label);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-d);}
.cal-cell{min-height:70px;padding:6px 8px;background:#fff;border:1px solid var(--ocean-ll);border-radius:4px;cursor:pointer;transition:background .2s;display:flex;flex-direction:column;gap:3px;}
.cal-cell:hover{background:var(--ocean-ll);}
.cal-cell.other-month .cal-day{color:var(--muted);}
.cal-cell.today{border-color:var(--ocean);background:rgba(91,174,188,.07);}
.cal-day{font-family:var(--en);font-size:14px;color:var(--ink);}
.cal-dot{display:flex;flex-direction:column;gap:2px;}
.cal-res-item{font-size:10px;background:var(--ocean-ll);color:var(--deep);border-radius:2px;padding:1px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-popup{position:absolute;z-index:50;background:#fff;border:1px solid var(--ocean-l);border-radius:var(--radius);padding:14px 16px;min-width:220px;box-shadow:0 12px 30px -10px rgba(44,62,66,.25);}
.cal-popup h4{font-size:13px;margin-bottom:10px;color:var(--deep);}
.cal-popup-item{font-size:12px;padding:5px 0;border-bottom:1px solid var(--ocean-ll);display:flex;gap:8px;}
.cal-popup-item:last-child{border-bottom:none;}

/* ===== HISTORY ===== */
.hist-select{max-width:320px;margin-bottom:20px;}
.hist-card{background:#fff;border:1px solid var(--ocean-ll);border-radius:var(--radius);padding:16px 20px;margin-bottom:10px;}
.hist-card .hdate{font-family:var(--en);font-style:italic;font-size:18px;color:var(--deep);}
.hist-card .hmeta{font-size:12px;color:var(--muted-d);margin-top:4px;}
.hist-card .hnotes{font-size:13px;color:var(--ink);margin-top:8px;line-height:1.8;}

/* ===== STATS ROW ===== */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
.stat-card{background:#fff;border:1px solid var(--ocean-ll);border-radius:var(--radius);padding:18px 20px;}
.stat-card .sv{font-family:var(--en);font-style:italic;font-size:34px;color:var(--ocean);line-height:1;}
.stat-card .sl{font-family:var(--label);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-d);margin-top:5px;}

/* ===== RESPONSIVE ===== */
@media(max-width:640px){
  .adm-main{padding:20px 14px;}
  .form-2col{grid-template-columns:1fr;}
  .modal{padding:24px 18px;}
  .stats{grid-template-columns:1fr 1fr;}
  .cal-cell{min-height:52px;padding:4px 5px;}
  .cal-res-item{display:none;}
  thead th:nth-child(n+5){display:none;}
  tbody td:nth-child(n+5){display:none;}
}
</style>
</head>
<body>

<!-- PASSWORD OVERLAY -->
<div id="pw-overlay">
  <img src="assets/kao-logo.png" alt="kao">
  <p class="sub">Admin Access</p>
  <form id="pw-form">
    <input id="pw-input" type="password" placeholder="パスワードを入力" autocomplete="current-password">
    <p id="pw-err">パスワードが違います</p>
    <button id="pw-submit" type="submit">Enter</button>
  </form>
</div>

<!-- HEADER -->
<header class="adm-header">
  <div class="logo">
    <img src="assets/kao-logo.png" alt="kao 訪問美容">
    <span class="logo-label">管理画面</span>
  </div>
  <button class="logout" id="logout-btn">ログアウト</button>
</header>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" data-tab="reservations">予約管理</button>
  <button class="tab-btn" data-tab="customers">顧客管理</button>
  <button class="tab-btn" data-tab="calendar">カレンダー</button>
  <button class="tab-btn" data-tab="history">施術履歴</button>
</div>

<!-- MAIN -->
<div class="adm-main">

  <!-- ===== 予約管理 ===== -->
  <div class="tab-panel active" id="panel-reservations">
    <div id="res-stats" class="stats"></div>
    <div class="sec-header">
      <span class="sec-title">予約一覧</span>
      <button class="btn btn-primary" id="res-add-btn">＋ 予約を追加</button>
    </div>
    <div class="tbl-wrap">
      <table id="res-table">
        <thead><tr>
          <th>日付</th><th>時間</th><th>お名前</th><th>メニュー</th>
          <th>ステータス</th><th>メモ</th><th></th>
        </tr></thead>
        <tbody id="res-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ===== 顧客管理 ===== -->
  <div class="tab-panel" id="panel-customers">
    <div class="sec-header">
      <span class="sec-title">顧客一覧</span>
      <button class="btn btn-primary" id="cust-add-btn">＋ 顧客を追加</button>
    </div>
    <div class="tbl-wrap">
      <table id="cust-table">
        <thead><tr>
          <th>お名前</th><th>ふりがな</th><th>電話番号</th><th>住所</th>
          <th>最終来訪</th><th></th>
        </tr></thead>
        <tbody id="cust-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ===== カレンダー ===== -->
  <div class="tab-panel" id="panel-calendar">
    <div class="cal-nav">
      <button class="cal-nav-btn" id="cal-prev">‹</button>
      <div class="cal-title" id="cal-title"></div>
      <button class="cal-nav-btn" id="cal-next">›</button>
    </div>
    <div class="cal-grid" id="cal-dow">
      <div class="cal-dow">日</div><div class="cal-dow">月</div>
      <div class="cal-dow">火</div><div class="cal-dow">水</div>
      <div class="cal-dow">木</div><div class="cal-dow">金</div>
      <div class="cal-dow">土</div>
    </div>
    <div class="cal-grid" id="cal-body"></div>
  </div>

  <!-- ===== 施術履歴 ===== -->
  <div class="tab-panel" id="panel-history">
    <div class="sec-header"><span class="sec-title">施術履歴</span></div>
    <div class="form-row hist-select">
      <label>顧客を選択</label>
      <select id="hist-select"><option value="">-- 顧客を選んでください --</option></select>
    </div>
    <div id="hist-body"></div>
  </div>

</div><!-- /adm-main -->

<!-- ===== RESERVATION MODAL ===== -->
<div class="modal-bg" id="res-modal-bg">
  <div class="modal">
    <h3 id="res-modal-title">予約を追加</h3>
    <input type="hidden" id="res-id">
    <div class="form-2col">
      <div class="form-row">
        <label>日付 *</label>
        <input type="date" id="res-date">
      </div>
      <div class="form-row">
        <label>時間 *</label>
        <input type="time" id="res-time" value="10:00">
      </div>
    </div>
    <div class="form-row">
      <label>顧客</label>
      <select id="res-customer">
        <option value="">-- 顧客を選択（または下に名前を入力）--</option>
      </select>
    </div>
    <div class="form-row">
      <label>お名前（顧客未登録の場合）</label>
      <input type="text" id="res-name" placeholder="山田 花子 様">
    </div>
    <div class="form-row">
      <label>訪問先住所</label>
      <input type="text" id="res-address" placeholder="逗子市… （顧客選択時に自動入力）">
    </div>
    <div class="form-2col">
      <div class="form-row">
        <label>メニュー *</label>
        <select id="res-menu">
          <option value="カット">カット — ¥4,400</option>
          <option value="カラー">カラー（Coming Soon）</option>
          <option value="パーマ">パーマ（Coming Soon）</option>
          <option value="ヘッドスパ">ヘッドスパ（Coming Soon）</option>
          <option value="トリートメント">トリートメント（Coming Soon）</option>
          <option value="セット・アレンジ">セット・アレンジ（Coming Soon）</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-row">
        <label>ステータス</label>
        <select id="res-status">
          <option value="confirmed">確定</option>
          <option value="tentative">仮予約</option>
          <option value="completed">完了</option>
          <option value="cancelled">キャンセル</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>メモ</label>
      <textarea id="res-notes" placeholder="ベッド上での施術、ご要望など"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="res-modal-cancel">キャンセル</button>
      <button class="btn btn-primary" id="res-modal-save">保存</button>
    </div>
  </div>
</div>

<!-- ===== CUSTOMER MODAL ===== -->
<div class="modal-bg" id="cust-modal-bg">
  <div class="modal">
    <h3 id="cust-modal-title">顧客を追加</h3>
    <input type="hidden" id="cust-id">
    <div class="form-2col">
      <div class="form-row">
        <label>お名前 *</label>
        <input type="text" id="cust-name" placeholder="山田 花子">
      </div>
      <div class="form-row">
        <label>ふりがな</label>
        <input type="text" id="cust-kana" placeholder="やまだ はなこ">
      </div>
    </div>
    <div class="form-row">
      <label>電話番号</label>
      <input type="tel" id="cust-phone" placeholder="090-0000-0000">
    </div>
    <div class="form-row">
      <label>住所</label>
      <input type="text" id="cust-address" placeholder="逗子市…">
    </div>
    <div class="form-row">
      <label>メモ</label>
      <textarea id="cust-notes" placeholder="アレルギー、特記事項など"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cust-modal-cancel">キャンセル</button>
      <button class="btn btn-primary" id="cust-modal-save">保存</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

/* ===== AUTH ===== */
var PW = 'kao0421', AUTH_KEY = 'kao_admin_auth';
var overlay = document.getElementById('pw-overlay');

function isAuthed(){ return sessionStorage.getItem(AUTH_KEY) === '1'; }
function showOverlay(){ overlay.style.display = 'flex'; }
function hideOverlay(){ overlay.style.opacity='0'; overlay.style.transition='opacity .4s'; setTimeout(function(){ overlay.style.display='none'; },400); }

if(!isAuthed()) showOverlay(); else overlay.style.display='none';

document.getElementById('pw-form').addEventListener('submit', function(e){
  e.preventDefault();
  if(document.getElementById('pw-input').value === PW){
    sessionStorage.setItem(AUTH_KEY,'1');
    hideOverlay();
    init();
  } else {
    var err = document.getElementById('pw-err');
    err.style.opacity = '1';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
});

document.getElementById('logout-btn').addEventListener('click', function(){
  sessionStorage.removeItem(AUTH_KEY);
  location.reload();
});

/* ===== DATA ===== */
var CUST_KEY = 'kao_customers', RES_KEY = 'kao_reservations';

function loadCustomers(){ try{ return JSON.parse(localStorage.getItem(CUST_KEY)||'[]'); }catch(e){ return []; } }
function saveCustomers(d){ localStorage.setItem(CUST_KEY, JSON.stringify(d)); }
function loadReservations(){ try{ return JSON.parse(localStorage.getItem(RES_KEY)||'[]'); }catch(e){ return []; } }
function saveReservations(d){ localStorage.setItem(RES_KEY, JSON.stringify(d)); }

function uid(){
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

/* ===== TABS ===== */
document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
    if(btn.dataset.tab === 'calendar') renderCalendar();
    if(btn.dataset.tab === 'history') renderHistorySelect();
  });
});

/* ===== FORMAT HELPERS ===== */
function fmtDate(d){
  if(!d) return '—';
  var p = d.split('-');
  return p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日';
}
function fmtTime(t){ return t||'—'; }
var STATUS_LABEL = { confirmed:'確定', tentative:'仮予約', completed:'完了', cancelled:'キャンセル' };
var STATUS_CLASS = { confirmed:'badge-confirmed', tentative:'badge-tentative', completed:'badge-completed', cancelled:'badge-cancelled' };

/* ===== RESERVATION TABLE ===== */
function renderStats(){
  var res = loadReservations();
  var today = new Date().toISOString().slice(0,10);
  var upcoming = res.filter(function(r){ return r.date >= today && r.status !== 'cancelled'; }).length;
  var completed = res.filter(function(r){ return r.status === 'completed'; }).length;
  var custs = loadCustomers().length;
  document.getElementById('res-stats').innerHTML =
    stat(upcoming,'今後の予約') + stat(completed,'完了済み') + stat(custs,'顧客数');
}
function stat(v,l){ return '<div class="stat-card"><div class="sv">'+v+'</div><div class="sl">'+l+'</div></div>'; }

function renderReservations(){
  renderStats();
  var res = loadReservations().slice().sort(function(a,b){ return a.date>b.date?1:a.date<b.date?-1:0; });
  var custs = loadCustomers();
  var tbody = document.getElementById('res-tbody');
  if(!res.length){
    tbody.innerHTML = '<tr class="empty-row"><td colspan="7">予約がまだありません</td></tr>';
    return;
  }
  tbody.innerHTML = res.map(function(r){
    var cust = custs.find(function(c){ return c.id === r.customerId; });
    var name = cust ? cust.name : (r.customerName||'—');
    return '<tr>'+
      '<td>'+fmtDate(r.date)+'</td>'+
      '<td>'+fmtTime(r.time)+'</td>'+
      '<td>'+esc(name)+'</td>'+
      '<td>'+esc(r.menu||'—')+'</td>'+
      '<td><span class="badge '+STATUS_CLASS[r.status]+'">'+STATUS_LABEL[r.status]+'</span></td>'+
      '<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--muted-d)">'+esc(r.notes||'')+'</td>'+
      '<td><div class="td-actions">'+
        '<button class="btn btn-map btn-sm" onclick="openMaps(\''+r.id+'\')" title="Googleマップでルートを開く">🗺 地図</button>'+
        '<button class="btn btn-ghost btn-sm" onclick="editRes(\''+r.id+'\')">編集</button>'+
        '<button class="btn btn-danger btn-sm" onclick="delRes(\''+r.id+'\')">削除</button>'+
      '</div></td>'+
    '</tr>';
  }).join('');
}

/* ===== RESERVATION MODAL ===== */
var resBg = document.getElementById('res-modal-bg');
document.getElementById('res-add-btn').addEventListener('click', function(){ openResModal(); });
document.getElementById('res-modal-cancel').addEventListener('click', function(){ resBg.classList.remove('open'); });
resBg.addEventListener('click', function(e){ if(e.target===resBg) resBg.classList.remove('open'); });

function populateResCustomerSelect(selectedId){
  var custs = loadCustomers();
  var sel = document.getElementById('res-customer');
  sel.innerHTML = '<option value="">-- 顧客を選択 --</option>' +
    custs.map(function(c){ return '<option value="'+c.id+'"'+(c.id===selectedId?' selected':'')+'>'+esc(c.name)+(c.kana?' （'+esc(c.kana)+'）':'')+'</option>'; }).join('');
}

function openResModal(id){
  document.getElementById('res-modal-title').textContent = id ? '予約を編集' : '予約を追加';
  populateResCustomerSelect('');
  if(id){
    var r = loadReservations().find(function(x){ return x.id===id; });
    document.getElementById('res-id').value = r.id;
    document.getElementById('res-date').value = r.date||'';
    document.getElementById('res-time').value = r.time||'10:00';
    document.getElementById('res-customer').value = r.customerId||'';
    document.getElementById('res-name').value = r.customerName||'';
    document.getElementById('res-menu').value = r.menu||'カット';
    document.getElementById('res-status').value = r.status||'confirmed';
    document.getElementById('res-notes').value = r.notes||'';
    document.getElementById('res-address').value = r.address||'';
  } else {
    document.getElementById('res-id').value = '';
    document.getElementById('res-date').value = new Date().toISOString().slice(0,10);
    document.getElementById('res-time').value = '10:00';
    document.getElementById('res-customer').value = '';
    document.getElementById('res-name').value = '';
    document.getElementById('res-menu').value = 'カット';
    document.getElementById('res-status').value = 'confirmed';
    document.getElementById('res-notes').value = '';
    document.getElementById('res-address').value = '';
  }
  resBg.classList.add('open');
}

document.getElementById('res-customer').addEventListener('change', function(){
  var custId = this.value;
  if(!custId) return;
  var cust = loadCustomers().find(function(c){ return c.id===custId; });
  if(cust && cust.address && !document.getElementById('res-address').value){
    document.getElementById('res-address').value = cust.address;
  }
});

window.editRes = function(id){ openResModal(id); };

window.openMaps = function(id){
  var HOME = '逗子市沼間4-4-19';
  var res = loadReservations();
  var custs = loadCustomers();
  var r = res.find(function(x){ return x.id===id; });
  if(!r) return;

  // 目的地の住所
  var destCust = custs.find(function(c){ return c.id===r.customerId; });
  var dest = r.address || (destCust && destCust.address) || '';
  if(!dest){ alert('訪問先の住所が登録されていません。\n予約の「訪問先住所」または顧客の住所を入力してください。'); return; }

  // 同日の予約を時間順に並べて、この予約より前の直近の予約を探す
  var sameDay = res
    .filter(function(x){ return x.date===r.date && x.id!==r.id && x.status!=='cancelled'; })
    .sort(function(a,b){ return a.time>b.time?1:a.time<b.time?-1:0; });

  var prevRes = null;
  for(var i=0; i<sameDay.length; i++){
    if(sameDay[i].time < r.time) prevRes = sameDay[i];
  }

  var origin;
  if(prevRes){
    var prevCust = custs.find(function(c){ return c.id===prevRes.customerId; });
    origin = prevRes.address || (prevCust && prevCust.address) || HOME;
  } else {
    origin = HOME;
  }

  var url = 'https://www.google.com/maps/dir/'+encodeURIComponent(origin)+'/'+encodeURIComponent(dest);
  window.open(url, '_blank');
};

window.delRes = function(id){
  if(!confirm('この予約を削除しますか？')) return;
  saveReservations(loadReservations().filter(function(r){ return r.id!==id; }));
  renderReservations();
};

document.getElementById('res-modal-save').addEventListener('click', function(){
  var date = document.getElementById('res-date').value;
  if(!date){ alert('日付を入力してください'); return; }
  var custId = document.getElementById('res-customer').value;
  var custName = document.getElementById('res-name').value.trim();
  if(!custId && !custName){ alert('顧客を選択するか、お名前を入力してください'); return; }
  var id = document.getElementById('res-id').value;
  var res = loadReservations();
  var obj = {
    id: id||uid(), customerId: custId||null, customerName: custName,
    date: date, time: document.getElementById('res-time').value,
    menu: document.getElementById('res-menu').value,
    status: document.getElementById('res-status').value,
    notes: document.getElementById('res-notes').value.trim(),
    address: document.getElementById('res-address').value.trim(),
    createdAt: id ? (res.find(function(r){return r.id===id;})||{}).createdAt : new Date().toISOString()
  };
  if(id){ saveReservations(res.map(function(r){ return r.id===id?obj:r; })); }
  else { res.push(obj); saveReservations(res); }
  resBg.classList.remove('open');
  renderReservations();
});

/* ===== CUSTOMER TABLE ===== */
function renderCustomers(){
  var custs = loadCustomers();
  var res = loadReservations();
  var tbody = document.getElementById('cust-tbody');
  if(!custs.length){
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">顧客がまだ登録されていません</td></tr>';
    return;
  }
  tbody.innerHTML = custs.map(function(c){
    var visits = res.filter(function(r){ return r.customerId===c.id && r.status==='completed'; })
      .sort(function(a,b){ return a.date>b.date?-1:1; });
    var last = visits.length ? fmtDate(visits[0].date) : '—';
    return '<tr>'+
      '<td>'+esc(c.name)+'</td>'+
      '<td style="color:var(--muted-d)">'+esc(c.kana||'')+'</td>'+
      '<td><a href="tel:'+esc(c.phone||'')+'" style="color:var(--ocean)">'+esc(c.phone||'—')+'</a></td>'+
      '<td style="font-size:12px;color:var(--muted-d)">'+esc(c.address||'')+'</td>'+
      '<td style="font-size:12px;color:var(--muted-d)">'+last+'</td>'+
      '<td><div class="td-actions">'+
        '<button class="btn btn-ghost btn-sm" onclick="editCust(\''+c.id+'\')">編集</button>'+
        '<button class="btn btn-danger btn-sm" onclick="delCust(\''+c.id+'\')">削除</button>'+
      '</div></td>'+
    '</tr>';
  }).join('');
}

/* ===== CALENDAR ===== */
var calYear, calMonth;
(function(){ var n=new Date(); calYear=n.getFullYear(); calMonth=n.getMonth(); })();

document.getElementById('cal-prev').addEventListener('click', function(){
  calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar();
});
document.getElementById('cal-next').addEventListener('click', function(){
  calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar();
});

function renderCalendar(){
  var MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-title').textContent = calYear+'年 '+MONTHS[calMonth];
  var res = loadReservations().filter(function(r){ return r.status!=='cancelled'; });
  var custs = loadCustomers();
  var today = new Date().toISOString().slice(0,10);

  var first = new Date(calYear, calMonth, 1);
  var last = new Date(calYear, calMonth+1, 0);
  var startDow = first.getDay();

  var cells = '';
  for(var i=0;i<startDow;i++){
    var d = new Date(calYear, calMonth, -startDow+i+1);
    cells += '<div class="cal-cell other-month"><div class="cal-day">'+d.getDate()+'</div></div>';
  }
  for(var day=1; day<=last.getDate(); day++){
    var ds = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    var dayRes = res.filter(function(r){ return r.date===ds; });
    var isToday = ds===today;
    cells += '<div class="cal-cell'+(isToday?' today':'')+'" data-date="'+ds+'">' +
      '<div class="cal-day">'+day+'</div>' +
      '<div class="cal-dot">' +
        dayRes.map(function(r){
          var c = custs.find(function(x){ return x.id===r.customerId; });
          var nm = c?c.name:(r.customerName||r.menu||'予約');
          return '<div class="cal-res-item">'+fmtTime(r.time)+' '+esc(nm)+'</div>';
        }).join('') +
      '</div>' +
    '</div>';
  }
  var remain = (7 - (startDow + last.getDate()) % 7) % 7;
  for(var j=1;j<=remain;j++){
    cells += '<div class="cal-cell other-month"><div class="cal-day">'+j+'</div></div>';
  }
  document.getElementById('cal-body').innerHTML = cells;

  document.querySelectorAll('.cal-cell[data-date]').forEach(function(cell){
    cell.addEventListener('click', function(){
      var ds = cell.dataset.date;
      var dayRes = res.filter(function(r){ return r.date===ds; });
      if(!dayRes.length) return;
      var existing = document.querySelector('.cal-popup');
      if(existing) existing.remove();
      var popup = document.createElement('div');
      popup.className = 'cal-popup';
      popup.innerHTML = '<h4>'+fmtDate(ds)+'</h4>' +
        dayRes.map(function(r){
          var c = custs.find(function(x){ return x.id===r.customerId; });
          var nm = c?c.name:(r.customerName||'—');
          return '<div class="cal-popup-item">'+
            '<span>'+fmtTime(r.time)+'</span>'+
            '<span>'+esc(nm)+' / '+esc(r.menu)+'</span>'+
          '</div>';
        }).join('');
      cell.style.position = 'relative';
      cell.appendChild(popup);
      setTimeout(function(){
        document.addEventListener('click', function rem(e){
          if(!popup.contains(e.target)){ popup.remove(); document.removeEventListener('click',rem); }
        });
      },0);
    });
  });
}

/* ===== HISTORY ===== */
function renderHistorySelect(){
  var custs = loadCustomers();
  var sel = document.getElementById('hist-select');
  var val = sel.value;
  sel.innerHTML = '<option value="">-- 顧客を選んでください --</option>' +
    custs.map(function(c){ return '<option value="'+c.id+'">'+esc(c.name)+'</option>'; }).join('');
  sel.value = val;
  renderHistory();
}

document.getElementById('hist-select').addEventListener('change', renderHistory);

function renderHistory(){
  var custId = document.getElementById('hist-select').value;
  var body = document.getElementById('hist-body');
  if(!custId){ body.innerHTML = '<p style="color:var(--muted-d);font-size:13px;">顧客を選択すると施術履歴が表示されます。</p>'; return; }
  var res = loadReservations().filter(function(r){ return r.customerId===custId; })
    .sort(function(a,b){ return a.date>b.date?-1:1; });
  if(!res.length){ body.innerHTML = '<p style="color:var(--muted-d);font-size:13px;">施術履歴がありません。</p>'; return; }
  body.innerHTML = res.map(function(r){
    return '<div class="hist-card">'+
      '<div class="hdate">'+fmtDate(r.date)+' '+fmtTime(r.time)+'</div>'+
      '<div class="hmeta">'+esc(r.menu||'—')+
        ' &nbsp;·&nbsp; <span class="badge '+STATUS_CLASS[r.status]+'">'+STATUS_LABEL[r.status]+'</span>'+
      '</div>'+
      (r.notes?'<div class="hnotes">'+esc(r.notes)+'</div>':'')+
    '</div>';
  }).join('');
}

/* ===== ESCAPE ===== */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ===== INIT ===== */
function init(){
  renderReservations();
  renderCustomers();
  renderHistorySelect();
}

if(isAuthed()) init();

})();
</script>
